<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opret bruger</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <h1>Opret bruger</h1>
    <form id="opretBruger">
      <label>
        <input type="text" name="username" placeholder="Brugernavn" required />
      </label>
      <br />
      <label>
        <input type="email" name="email" placeholder="E-mail" required />
      </label>
      <br />
      <label>
        <input
          name="password"
          type="password"
          minlength="8"
          maxlength="128"
          placeholder="Password"
          required
        />
      </label>
      <br />
      <button>Registrer</button>
      <a href="/login.html">Tilbage til login</a>

      <!--De skal tilbage til login-->
    </form>
    <pre id="out"></pre>
    <script>
      const form = document.getElementById("opretBruger");
      const message = document.getElementById("out");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = form.username.value.trim();
        const email = form.email.value.trim();
        const password = form.password.value.trim();

        try {
          const res = await fetch("/auth/opretBruger", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password }),
          });
          const data = await res.json();

          message.textContent = data.message;

          if (res.ok) {
            setTimeout(() => {
              window.location.href = "/login.html";
            }, 1000);
          }
        } catch (err) {
          message.textContent = "Noget gik galt, prøv igen";
        }
      });
    </script>
  </body>
</html>
