<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  </head>
  <body>
    <h1>Quizplatform</h1>
    <div>
      <h2>Login</h2>
      <form id="login">
        <label>
          <input
            type="text"
            name="username"
            placeholder="Brugernavn"
            required
          />
        </label>
        <br />
        <label>
          <input
            name="password"
            type="password"
            minlength="8"
            maxlength="128"
            placeholder="Password"
            required
          />
        </label>
        <br />
        <button>Login</button>
      </form>

      <pre id="out"></pre>
      <a href="opretBruger.html">Ikke en bruger?</a>

      <div id="mfaSection" style="display: none">
        <p>Scan QR-kode i Authenticator-app og indtast kode:</p>
        <canvas id="qrcode" height="300" width="300"></canvas>
        <input id="mfaCode" placeholder="6-cifret kode" />
        <button id="verifyMfa">Verificer</button>
      </div>

      <script>
        const form = document.getElementById("login");
        const out = document.getElementById("out");
        const mfaSection = document.getElementById("mfaSection");
        const qrcodeCanvas = document.getElementById("qrcode");
        const verifyBtn = document.getElementById("verifyMfa");

        mfaSection.style.display = "none";

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = form.username.value;
          const password = form.password.value;

          try {
            const res = await fetch("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ username, password }),
            });

            const data = await res.json();
            out.textContent = data.message;

            if (!res.ok) {
              form.username.value = "";
              form.password.value = "";
              return;
            }

            if (data.mfaRequired) {
              form.style.display = "none";
              form.username.value = "";
              form.password.value = "";

              mfaSection.style.display = "block";
              if (data.otpauthUrl) {
                QRCode.toCanvas(qrcodeCanvas, data.otpauthUrl, (err) => {
                  if (err) console.error(err);
                });
              }
              return;
            }

            window.location.href = "/dashboard";
          } catch (err) {
            console.error(err);
            out.textContent = "Noget gik galt med login";
            form.username.value = "";
            form.password.value = "";
          }
        });

        verifyBtn.addEventListener("click", async () => {
          const code = document.getElementById("mfaCode").value;

          try {
            const res = await fetch("/auth/verify-mfa", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ code }),
            });

            const data = await res.json();
            out.textContent = data.message;

            if (res.ok) {
              window.location.href = "/dashboard";
            }
          } catch (err) {
            console.error(err);
            out.textContent = "Noget gik galt ved MFA-verifikation";
          }
        });
      </script>
    </div>
  </body>
</html>
