<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <h1 id="title"></h1>

    <p id="progress"></p>
    <p id="question"></p>

    <p id="question"></p>

    <div id="answers"></div>

    <br />

    <button onclick="submitAnswer()">Svar</button>
    <button id="nextBtn" onclick="nextQuestion()" style="display: none">
      Næste
    </button>

    <p id="feedback"></p>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const quizId = urlParams.get("id");

      let locked = false;
      let questions = [];
      let currentQuestion = 0;
      let selected = null;
      let selectedMultiple = [];
      let userAnswers = [];

      let score = 0;
      let startTime = Date.now();

      //load quiz data
      async function loadQuiz() {
        const response = await fetch("/quiz/" + quizId);
        const data = await response.json();
        questions = data.questions;
        document.getElementById("title").innerText = data.title;
        showQuestion();
      }

      //vis spørgsmål
      function showQuestion() {
        locked = false;

        const q = questions[currentQuestion];

        document.getElementById("question").innerHTML = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        document.getElementById("progress").innerText =
          `Spørgsmål ${currentQuestion + 1} / ${questions.length}`;

        selected = null;
        selectedMultiple = [];

        // SINGLE
        if (q.type === "single") {
          q.answers.forEach((answer, index) => {
            const label = document.createElement("label");

            const input = document.createElement("input");
            input.type = "radio";
            input.name = "answer";
            input.value = index;

            input.oninput = () => {
              if (locked) return;
              selected = input.value.trim();
            };

            label.appendChild(input);
            label.innerHTML += answer;
            answersDiv.appendChild(label);
            answersDiv.appendChild(document.createElement("br"));
          });
        }

        // MULTIPLE
        else if (q.type === "multiple") {
          q.answers.forEach((answer, index) => {
            const label = document.createElement("label");

            const input = document.createElement("input");
            input.type = "checkbox";
            input.value = index;

            input.onchange = () => {
              if (locked) return;

              if (input.checked) {
                selectedMultiple.push(index);
              } else {
                selectedMultiple = selectedMultiple.filter((i) => i !== index);
              }
            };

            label.appendChild(input);
            label.innerHTML += answer;
            answersDiv.appendChild(label);
            answersDiv.appendChild(document.createElement("br"));
          });
        }

        // CLOZE
        else if (q.type === "cloze") {
          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "Skriv dit svar...";

          input.oninput = () => {
            if (locked) return;
            selected = input.value;
          };

          answersDiv.appendChild(input);
        }

        document.getElementById("feedback").innerText = "";
        document.getElementById("nextBtn").style.display = "none";
      }
      //submit svar

      async function submitAnswer() {
        if (locked) return;
        locked = true;

        const q = questions[currentQuestion];

        const selectedAnswer =
          q.type === "multiple" ? selectedMultiple : selected;

        // LÅS INPUTS
        document.querySelectorAll("input").forEach((input) => {
          input.disabled = true;
        });

        locked = true;

        const res = await fetch("/quiz/answer", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            quizId,
            questionId: q.id,
            selected: selectedAnswer,
            mapping: q.mapping,
          }),
        });

        if (!res.ok) {
          const text = await res.text();
          console.error("SERVER FEJL:", text);
          alert("Server fejl – se konsol");
          return;
        }

        const data = await res.json();

        //UI feedback
        if (data.correct) {
          document.getElementById("feedback").innerText = "Korrekt!";
          score += data.points;
        } else {
          document.getElementById("feedback").innerText = "Forkert!";
        }

        userAnswers[currentQuestion] = {
          question: q.question,
          selected: selectedAnswer,
          answers: q.answers,
          mapping: q.mapping,
        };

        document.getElementById("nextBtn").style.display = "block";
      }

      //gå til næste spørgsmål
      function nextQuestion() {
        currentQuestion++;

        if (currentQuestion >= questions.length) {
          finishQuiz();
        } else {
          showQuestion();
        }
      }

      //afslut quiz
      async function finishQuiz() {
        const time = Math.floor((Date.now() - startTime) / 1000);

        alert(
          `Færdig!\nscore: ${score}/${questions.length}\ntid: ${time} sekunder`,
        );

        await fetch("/results", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            quizId,
            score: Math.round(score * 100) / 100,
            total: questions.length,
            time,
            answers: userAnswers,
          }),
        });
        window.location.href = "/dashboard";
      }

      loadQuiz();
    </script>
  </body>
</html>
