<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
  </head>
  <body>
    <h1>Velkommen til Dashboard</h1>
    <p>Her kan du administrere dine quizzer og se dine resultater.</p>

    <!-- Aktive quiz -->
    <h2>Aktive Quizzes</h2>
    <ul id="activeQuizzes"></ul>

    <h2>Dine gennemførte Quizzes</h2>
    <ul id="completedQuizzes"></ul>

    <div id="adminContent">
      <h2>Admin Panel</h2>

      <h3>Alle resultater</h3>
      <ul id="allResults"></ul>
    </div>

    <!--Almindelig bruger har: Start quiz, se resultat, tag quiz igen -->
    <!--Admin har: Tag quiz, upload quiz fil, slet quiz, se deltager liste med dropdown -->

    <script>
      async function loadQuizzes() {
        const res = await fetch("/quiz");
        const quizzes = await res.json();

        const list = document.getElementById("activeQuizzes");
        list.innerHTML = "";

        quizzes.forEach((q) => {
          const li = document.createElement("li");

          li.innerHTML = `
            ${q.title}
            <button onclick="startQuiz('${q.id}')">Start</button>
          `;

          list.appendChild(li);
        });
      }

      function startQuiz(id) {
        window.location.href = "/quiz.html?id=" + id;
      }

      loadQuizzes();
    </script>
  </body>
</html>
