<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Student</title>
    <script type="module">
      import Header from "./header.js";
      new Header("header-container");
    </script>
  </head>
  <body>
    <header id="header"></header>
    <h1>Velkommen til dit dashboard!</h1>
    <p>Her kan du se dine kommende opgaver, deadlines og meddelelser</p>
    <button id="admin-back-btn" style="display: none">
      Tilbage til admin dashboard
    </button>

    <!-- Aktive quiz -->
    <div>
      <h2>Aktive Quizzes</h2>
      <ul id="activeQuizzes"></ul>

    <h2>Dine gennemførte Quizzes</h2>
    <ul id="completedQuizzes"></ul>

      <h3>Alle resultater</h3>
      <ul id="allResults"></ul>
    </div>

    <!--Almindelig bruger har: Start quiz, se resultat, tag quiz igen -->
    <!--Admin har: Tag quiz, upload quiz fil, slet quiz, se deltager liste med dropdown -->

    <script>
      async function loadQuizzes() {
        const [quizRes, resultRes] = await Promise.all([
          fetch("/quiz"),
          fetch("/results/me"),
        ]);

        const quizzes = await quizRes.json();
        const results = await resultRes.json();

        const completedIds = results.map((r) => r.quizId);

        const activeList = document.getElementById("activeQuizzes");
        const completedList = document.getElementById("completedQuizzes");

        activeList.innerHTML = "";
        completedList.innerHTML = "";

        quizzes.forEach((q) => {
          const li = document.createElement("li");

          if (completedIds.includes(q.id)) {
            const result = results.find((r) => r.quizId === q.id);

            li.innerText = `${q.title} - ${result.score}/${result.total}`;
            completedList.appendChild(li);
          } else {
            li.innerHTML = `
              ${q.title}
              <button onclick="startQuiz('${q.id}')">Start</button>
            `;
            activeList.appendChild(li);
          }
        });
      }

      function startQuiz(id) {
        window.location.href = "/quiz.html?id=" + id;
      }

      loadQuizzes();

      // Vis kun "Tilbage til admin"-knappen, hvis den loggede bruger er admin
      fetch("/auth/me")
        .then((res) => (res.ok ? res.json() : null))
        .then((user) => {
          if (user && user.role === "admin") {
            const btn = document.getElementById("admin-back-btn");
            btn.style.display = "inline-block";
            btn.addEventListener("click", () => {
              window.location.href = "/dashboard";
            });
          }
        })
        .catch(() => {
          alert("Noget gik galt, prøv igen senere");
        });
    </script>
  </body>
</html>
