<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Admin</title>
  </head>
  <body>
    <h1>Admin</h1>
    <a id="studentview" href="/dashboard-student-view.html"
      >se elev dashboard</a
    >
    <script>
      // Det er her udelukkende til at admin roller kan navigere frem til elev dashboardet.
      const studentView = document.getElementById("studentview");
      studentView.addEventListener("click", async (e) => {
        e.preventDefault();
        studentView.addEventListener("click", async (e) => {
          e.preventDefault();
        });

        try {
          const res = await fetch("/dashboard-student-view", {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
            },
          });
          if (res.ok) {
            window.location.href = "/dashboard-student-view";
          }
        } catch (err) {
          alert("Noget gik galt, prøv igen senere");
        }
      });

      async function loadAllResults() {
        const res = await fetch("/results/all");

        if (!res.ok) return;

        const data = await res.json();

        const list = document.getElementById("allResults");
        list.innerHTML = "";

        data.forEach((r, index) => {
          const li = document.createElement("li");

          li.innerHTML = `
          <strong>${r.username}</strong> - Quiz ${r.quizId}
          <br>
          Quiz: ${r.quizName} ${r.quizId} <br>
          Score: ${r.score}/${r.total}
          <br>
          Tid: ${r.time}s
          <br>
          <button onclick="toggleDetails(${index})">Vis svar</button>
          <div id="details-${index}" style="display:none;"></div>
        `;

          list.appendChild(li);
        });
      }

      function toggleDetails(index) {
        const el = document.getElementById("details-" + index);

        if (el.style.display === "none") {
          el.style.display = "block";
          el.innerText = "Svar visning (kan udvides senere)";
        } else {
          el.style.display = "none";
        }
      }

      loadAllResults();
    </script>
  </body>
</html>
