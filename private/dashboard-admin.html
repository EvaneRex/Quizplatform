<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Admin</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <script type="module" src="./header.js" defer></script>
  </head>
  <body>
    <header id="header"></header>
    <button id="studentview">se elev dashboard</button>
    <h1>Admin Dashboard</h1>
    <p>Her kan du administrere quizzer og se resultater</p>

    <form
      id="uploadForm"
      action="/quiz/upload"
      method="POST"
      enctype="multipart/form-data"
    >
      <input type="file" name="file" accept=".json" required />
      <button type="submit">Upload quiz</button>
    </form>

    <h2>Oversigt over quizzer</h2>
    <ul id="quizList"></ul>

    <h3>Alle resultater</h3>
    <table border="1" id="allResults">
      <thead>
        <tr>
          <th>Bruger ID</th>
          <th>Brugernavn</th>
          <th>Quiz ID</th>
          <th>Quiz navn</th>
          <th>Korrekt</th>
          <th>Tid</th>
          <th>Svar</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      async function loadQuizzesAdmin() {
        try {
          const res = await fetch("/quiz/list");
          if (!res.ok) throw new Error("Kunne ikke hente quizzer");

          const quizzes = await res.json();
          const list = document.getElementById("quizList");
          list.innerHTML = "";

          if (quizzes.length === 0) {
            const li = document.createElement("li");
            li.textContent = "Ingen quizzer endnu";
            list.appendChild(li);
            return;
          }

          quizzes.forEach((quiz) => {
            const li = document.createElement("li");
            li.textContent = quiz + " ";

            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "Slet";

            deleteBtn.addEventListener("click", async () => {
              if (!confirm("Er du sikker på du vil slette?")) return;

              const delRes = await fetch("/quiz/" + quiz, { method: "DELETE" });
              if (!delRes.ok) {
                alert("Kunne ikke slette quizzen");
                return;
              }
              loadQuizzesAdmin(); // opdater listen
            });

            li.appendChild(deleteBtn);
            list.appendChild(li);
          });
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      }

      // Det er her udelukkende til at admin roller kan navigere frem til elev dashboardet.
      document.getElementById("studentview").addEventListener("click", () => {
        window.location.href = "/dashboard-student-view";
      });

      async function loadAllResults() {
        const res = await fetch("/results/all", {
          credentials: "include",
        });

        if (!res.ok) return;

        const data = await res.json();
        window.allResultsData = data;

        console.log("DATA:", data);

        const table = document.querySelector("#allResults tbody");
        table.innerHTML = "";

        data.forEach((r, index) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
          <td>${r.userId}</td>
          <td>${r.username}</td>
          <td>${r.quizId}</td>
          <td>${r.quizName}</td>
          <td>${r.score}/${r.total}</td>
          <td>${r.time}s</td>
          <td><button onclick="toggleDetails(${index})">Se svar</button></td>
        `;

          const detailsRow = document.createElement("tr");

          detailsRow.innerHTML = `
          <td colspan="7">
            <div id="details-${index}" style="display:none;"></div>
          </td>
        `;

          table.appendChild(tr);
          table.appendChild(detailsRow);
        });
      }

      function toggleDetails(index) {
        const el = document.getElementById("details-" + index);

        if (el.style.display === "none") {
          el.style.display = "block";

          const result = window.allResultsData[index];

          if (!result.answers) {
            el.innerHTML = "Ingen svar gemt";
            return;
          }

          el.innerHTML = result.answers
            .map((a, i) => {
              return `
                    <div>
                      <strong>Spørgsmål ${i + 1}:</strong><br>
                      ${a.question}<br><br>

                      <strong>Svarmuligheder:</strong><br>
                      ${a.answers
                        .map((ans, idx) => {
                          const isCorrect = a.correct.includes(idx);
                          const isSelected = Array.isArray(a.selected)
                            ? a.selected.includes(idx)
                            : a.selected == idx;

                          return `
                            <div style="
                              color: ${isCorrect ? "green" : isSelected ? "red" : "black"};
                              font-weight: ${isCorrect ? "bold" : "normal"};
                            ">
                              ${ans}
                              ${isCorrect ? "✔️" : ""}
                              ${isSelected && !isCorrect ? "❌" : ""}
                            </div>
                          `;
                        })
                        .join("")}
                    </div>
                  `;
            })
            .join("<hr>");
        } else {
          el.style.display = "none";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const uploadForm = document.getElementById("uploadForm");
        loadQuizzesAdmin();
        loadAllResults();

        uploadForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          console.log("UPLOAD TRYKKET");

          const file = uploadForm.file.files[0];
          if (!file) {
            console.log("Ingen fil valgt");
            return;
          }

          const formData = new FormData();
          formData.append("file", file);

          try {
            console.log("sender request");

            const res = await fetch("/quiz/upload", {
              method: "POST",
              body: formData,
            });

            console.log("response modtaget:", res.status);

            const data = await res.json();
            console.log("SERVER SVAR:", data);

            alert(data.message);
            loadQuizzesAdmin();
          } catch (err) {
            console.error("fetch fejl", err);
            alert("Fejl ved upload");
          }
        });
      });
    </script>
  </body>
</html>
