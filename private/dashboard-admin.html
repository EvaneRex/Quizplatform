<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Admin</title>
    <div id="header-container"></div>
    <script type="module">
      import Header from "./header.js";
      new Header("header-container");
    </script>
  </head>
  <body>
    <header id="header"></header>
    <a id="studentview" href="/dashboard-student-view.html"
      >se elev dashboard</a
    >
    <h1>Admin</h1>

    <form
      id="uploadForm"
      action="/quiz/upload"
      method="POST"
      enctype="multipart/form-data"
    >
      <input type="file" name="file" accept=".json, .xml" required />
      <button type="submit">Upload quiz</button>
    </form>

    <table border="1" id="allResults">
      <thead>
        <tr>
          <th>Bruger ID</th>
          <th>Brugernavn</th>
          <th>Quiz ID</th>
          <th>Quiz navn</th>
          <th>Korrekt</th>
          <th>Tid</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      const uploadForm = document.getElementById("uploadForm");

      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const file = uploadForm.file.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        try {
          const res = await fetch("/quiz/upload", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();

          uploadForm.reset();

          loadQuizFiles();
        } catch (err) {
          alert("Fejl ved upload");
          uploadForm.reset();
        }
      });

      // Det er her udelukkende til at admin roller kan navigere frem til elev dashboardet.
      const studentView = document.getElementById("studentview");
      studentView.addEventListener("click", async (e) => {
        e.preventDefault();
        studentView.addEventListener("click", async (e) => {
          e.preventDefault();
        });

        try {
          const res = await fetch("/dashboard-student-view", {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
            },
          });
          if (res.ok) {
            window.location.href = "/dashboard-student-view";
          }
        } catch (err) {
          alert("Noget gik galt, prøv igen senere");
        }
      });

      async function loadAllResults() {
        const res = await fetch("/results/all");

        if (!res.ok) return;

        const data = await res.json();

        const table = document.querySelector("#allResults tbody");
        table.innerHTML = "";

        data.forEach((r, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${r.userId}</td>
            <td>${r.username}</td>
            <td>${r.quizId}</td>
            <td>${r.quizName}</td>
            <td>${r.score}/${r.total}</td>
            <td>${r.time}s</td>
          `;
          table.appendChild(tr);
        });
      }

      function toggleDetails(index) {
        const el = document.getElementById("details-" + index);

        if (el.style.display === "none") {
          el.style.display = "block";
          el.innerText = "Svar visning (kan udvides senere)";
        } else {
          el.style.display = "none";
        }
      }

      loadAllResults();
    </script>
  </body>
</html>
